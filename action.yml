name: 'SherlockQA-AI'
description: 'AI-powered code review and QA that finds bugs, security issues, and suggests test scenarios. Works with OpenAI, Anthropic Claude, Google Gemini, Azure OpenAI, and Ollama.'
author: 'mayurrawte'

branding:
  icon: 'search'
  color: 'purple'

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
    default: ${{ github.token }}

  # AI Provider
  ai-provider:
    description: 'AI provider: openai, anthropic, gemini, azure, azure-responses, ollama (default: openai). Overridable via .sherlockqa.yml.'
    required: false

  # OpenAI Configuration
  openai-api-key:
    description: 'OpenAI API key (required if ai-provider=openai)'
    required: false
  model:
    description: 'Model to use. Defaults: openai=gpt-4o-mini, anthropic=claude-sonnet-4-5, gemini=gemini-2.0-flash, ollama=llama3.1'
    required: false

  # Anthropic Configuration
  anthropic-api-key:
    description: 'Anthropic API key (required if ai-provider=anthropic)'
    required: false

  # Google Gemini Configuration
  gemini-api-key:
    description: 'Google AI Studio / Gemini API key (required if ai-provider=gemini)'
    required: false

  # Ollama Configuration (local / self-hosted)
  ollama-base-url:
    description: 'Ollama server base URL (default: http://localhost:11434). Only useful if your runner can reach an Ollama instance.'
    required: false
    default: 'http://localhost:11434'

  # Azure OpenAI Configuration
  azure-api-key:
    description: 'Azure OpenAI API key (required if ai-provider=azure or azure-responses)'
    required: false
  azure-endpoint:
    description: 'Azure OpenAI endpoint URL (e.g., https://your-resource.openai.azure.com)'
    required: false
  azure-deployment:
    description: 'Azure OpenAI deployment name'
    required: false
  azure-api-version:
    description: 'Azure OpenAI API version'
    required: false
    default: '2024-02-15-preview'

  # Review Configuration
  mode:
    description: 'Review mode: general (default) or security (audit for vulnerabilities only). Overridable via .sherlockqa.yml.'
    required: false
  min-severity:
    description: 'Minimum severity to report: error, warning, suggestion (default: warning). Overridable via .sherlockqa.yml.'
    required: false
  ignore-patterns:
    description: 'Comma-separated list of file patterns to ignore. Supports glob (*, **, ?). Default: *.md,*.txt,package-lock.json,yarn.lock. Overridable via .sherlockqa.yml.'
    required: false

  # Custom Prompts
  persona:
    description: 'Custom persona/role instructions (e.g., "Act as a senior security engineer")'
    required: false
  domain-knowledge:
    description: 'Domain-specific context for better reviews (e.g., freight forwarding, e-commerce)'
    required: false

  # Max tokens for response
  max-tokens:
    description: 'Maximum tokens for AI response (default: 4096). Overridable via .sherlockqa.yml.'
    required: false

  # Approval Configuration
  auto-approve:
    description: 'Submit APPROVE when verdict is approved (default: false; requires PAT or repo settings to allow Actions to approve PRs). Overridable via .sherlockqa.yml.'
    required: false

  # Code Quality Analysis
  code-quality:
    description: 'Enable code quality analysis — repetitive code, code smells, maintainability issues (default: false). Overridable via .sherlockqa.yml.'
    required: false

  # Output Style
  review-style:
    description: 'Review output style - compact (verdict at top, concise) or detailed (verbose). Default: compact. Overridable via .sherlockqa.yml.'
    required: false

  use-emoji:
    description: 'Use emojis in review output (default: true). Overridable via .sherlockqa.yml.'
    required: false

  personality:
    description: 'Review personality - detective (Sherlock), bro (casual dude), desi (Hinglish), professional (formal), enthusiastic (hyped up). Default: detective. Overridable via .sherlockqa.yml.'
    required: false

  review-strictness:
    description: 'How strict the review should be - lenient (only critical issues), balanced (reasonable checks), strict (thorough, flags more issues). Default: balanced. Overridable via .sherlockqa.yml.'
    required: false

  update-summary-comment:
    description: 'Maintain a single sticky issue-comment with the current review summary, updated in place each run (default: true). Overridable via .sherlockqa.yml.'
    required: false

  create-check-run:
    description: 'Create a GitHub Check Run so the verdict and annotations appear in the PR Checks column — requires checks:write permission (default: true). Overridable via .sherlockqa.yml.'
    required: false

outputs:
  verdict:
    description: 'Review verdict (approved, needs_changes, do_not_merge)'
  summary:
    description: 'Review summary'
  issues-count:
    description: 'Number of issues found'
  tokens-in:
    description: 'Input tokens consumed by the AI call'
  tokens-out:
    description: 'Output tokens generated by the AI call'
  cost-usd:
    description: 'Estimated cost of this review in USD (only set when the model is in the pricing table)'

runs:
  using: 'node20'
  main: 'dist/index.js'
